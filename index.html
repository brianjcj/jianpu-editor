<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>简谱编辑器 — JianPu Editor</title>
  <style>
    /* ===== CSS Variables - Material Design 3 Theme ===== */
    :root {
      /* 主色调 - 活力蓝紫 */
      --primary: #6366f1;
      --primary-container: #e0e7ff;
      --on-primary: #ffffff;
      --on-primary-container: #1e1b4b;

      /* 次色调 - 清新青绿 */
      --secondary: #06b6d4;
      --secondary-container: #cffafe;
      --on-secondary: #ffffff;

      /* 第三色 - 柔和粉紫 */
      --tertiary: #ec4899;
      --tertiary-container: #fce7f3;

      /* 表面色 - 明亮清新 */
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-variant: #f1f5f9;
      --surface-light: #f8fafc;

      /* 文字色 */
      --text: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --on-surface-variant: #64748b;

      /* 边框与分割 */
      --border: #e2e8f0;
      --outline: #cbd5e1;
      --divider: #f1f5f9;

      /* 功能色 */
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --info: #3b82f6;

      /* 特殊背景 */
      --editor-bg: #ffffff;
      --canvas-bg: #ffffff;
      --canvas-container-bg: #f1f5f9;

      /* 阴影 - Material 风格 */
      --shadow-1: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-2: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
      --shadow-3: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);

      /* 头部 - 浅色现代风格 */
      --header-bg: #ffffff;
      --header-text: #0f172a;
      --header-border: #e2e8f0;

      /* 旧变量兼容 */
      --accent: var(--primary);
      --accent-hover: #4f46e5;
      --text: var(--text);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* ===== Header - Material Design ===== */
    .header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      box-shadow: var(--shadow-1);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      z-index: 10;
    }

    .header-row {
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      height: 44px;
    }

    .header-row:first-child {
      border-bottom: 1px solid var(--header-border);
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      box-shadow: var(--shadow-2);
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: center;
      min-width: 0;
    }

    /* ===== Material Design Buttons ===== */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover::after {
      opacity: 0.08;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:active::after {
      opacity: 0.12;
    }

    /* Filled button - Primary (same as secondary now) */
    .btn-primary {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--outline);
    }

    .btn-primary:hover {
      background: var(--surface-variant);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Outlined button - Secondary */
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid var(--outline);
    }

    .btn-secondary:hover {
      background: var(--surface-variant);
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }

    .btn-active {
      background: var(--primary-container) !important;
      color: var(--on-primary-container) !important;
      border-color: var(--primary) !important;
    }

    .panel-toggle {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .toggle-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--outline);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .toggle-btn:hover {
      background: var(--surface-variant);
      border-color: var(--primary);
      color: var(--primary);
    }

    .toggle-btn.active {
      background: var(--primary-container);
      color: var(--on-primary-container);
      border-color: var(--primary);
      font-weight: 600;
    }

    .status {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 80px;
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ===== Main Layout ===== */
    .main {
      display: flex;
      height: calc(100vh - 88px);
      overflow: hidden;
    }

    /* ===== Mobile Responsive ===== */
    @media (max-width: 768px) {
      .header-row {
        height: 40px;
        padding: 0 10px;
        gap: 8px;
      }
      .header-row:first-child {
        border-bottom: 1px solid var(--header-border);
      }

      .toolbar {
        gap: 4px;
      }

      .btn {
        padding: 6px 10px;
        font-size: 12px;
      }

      .btn {
        padding: 6px 8px;
        font-size: 12px;
        gap: 2px;
      }

      .btn svg {
        width: 14px;
        height: 14px;
      }

      .btn .btn-text {
        font-size: 11px;
      }

      .status {
        display: none;
      }

      .main {
        flex-direction: column;
        height: calc(100vh - 80px);
      }

      .editor-panel {
        width: 100% !important;
        min-width: auto;
        height: 42%;
        min-height: 150px;
        border-right: none;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }

      .editor {
        width: 100% !important;
        flex: 1;
        font-size: 15px;
        padding: 10px;
        line-height: 1.6;
        min-height: 80px;
      }

      .syntax-help {
        width: 100% !important;
        display: block;
        max-height: 100px;
        padding: 6px 8px;
        font-size: 10px;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .syntax-help h4 {
        font-size: 11px;
        margin-bottom: 3px;
      }

      .syntax-help table {
        font-size: 10px;
      }

      .syntax-help td {
        padding: 1px 3px;
        line-height: 1.3;
      }

      .preview-panel {
        width: 100% !important;
        height: 58%;
      }

      .canvas-container {
        width: 100% !important;
        padding: 8px;
      }
      .zoom-btn {
        width: 36px;
        height: 36px;
        font-size: 18px;
      }

      .zoom-level {
        font-size: 13px;
        min-width: 50px;
      }

      #jianpuCanvas {
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
      }
    }

    /* ===== Editor Panel ===== */
    .editor-panel {
      width: 40%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .panel-header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--on-surface-variant);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
    }

    .panel-header-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--primary-container);
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-right: 8px;
    }

    .editor {
      flex: 1;
      background: var(--editor-bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
      font-size: 15px;
      line-height: 1.6;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
    }

    .editor::placeholder {
      color: #4a6fa5;
    }

    /* Syntax legend */
    .syntax-help {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      max-height: 160px;
      overflow-y: auto;
    }

    .syntax-help h4 {
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 13px;
    }

    .syntax-help code {
      background: var(--surface-light);
      padding: 1px 4px;
      border-radius: 3px;
      color: var(--warning);
      font-family: monospace;
    }

    .syntax-help table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
    }

    .syntax-help td {
      padding: 2px 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ===== Preview Panel ===== */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--canvas-bg);
      position: relative;
    }

    .preview-header {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--on-surface-variant);
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.3px;
    }

    .zoom-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .zoom-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--surface-variant);
      color: var(--text-secondary);
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-1);
    }

    .zoom-btn:hover {
      background: var(--primary-container);
      color: var(--primary);
      transform: scale(1.1);
    }

    .zoom-btn:active {
      transform: scale(0.95);
    }

    .zoom-level {
      min-width: 50px;
      text-align: center;
      font-size: 13px;
    }

    .zoom-select {
      padding: 6px 12px;
      border: 1.5px solid var(--outline);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      outline: none;
      min-width: 90px;
      text-align: center;
      transition: all 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .zoom-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-container);
    }

    .zoom-select:hover {
      border-color: var(--primary);
    }

    .canvas-container {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      background: var(--canvas-container-bg);
    }

    #jianpuCanvas {
      background: white;
      box-shadow: var(--shadow-3);
      border-radius: 12px;
      max-width: 100%;
    }

    /* ===== Playback Progress ===== */
    .playback-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--surface-variant);
      display: none;
      border-radius: 2px 2px 0 0;
      overflow: hidden;
    }

    .playback-progress {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      width: 0%;
      transition: width 0.1s linear;
      border-radius: 2px;
    }

    /* ===== Print Styles ===== */
    @media print {
      body {
        background: white !important;
        overflow: visible !important;
        height: auto !important;
      }

      .header,
      .editor-panel,
      .preview-header,
      .zoom-controls,
      .playback-bar {
        display: none !important;
      }

      .main {
        display: block !important;
        height: auto !important;
      }

      .preview-panel {
        display: block !important;
        background: white !important;
        height: auto !important;
      }

      .canvas-container {
        display: block !important;
        padding: 0 !important;
        background: white !important;
        overflow: visible !important;
      }

      #jianpuCanvas {
        box-shadow: none !important;
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
      }
    }

    /* ===== Panel Toggle Buttons ===== */
    .panel-toggle {
      display: flex;
      gap: 4px;
    }

    .toggle-btn {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: var(--surface-light);
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    .toggle-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .panel-hidden {
      display: none !important;
    }

    .editor-panel,
    .preview-panel {
      transition: flex 0.3s ease, height 0.3s ease;
    }

    /* ===== Scrollbars - Modern ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--outline);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
    <!-- Header -->
  <header class="header">
    <div class="header-row">
      <div class="logo"><span class="logo-icon">♪</span></div>
      <div class="toolbar">
        <button class="btn btn-primary" id="btnPlay" title="播放 (Space)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <span class="btn-text">播放</span>
        </button>
        <button class="btn btn-secondary" id="btnStop" title="停止 (Esc)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
          <span class="btn-text">停止</span>
        </button>
        <button class="btn btn-secondary" id="btnPrint" title="打印 (Ctrl+P)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
          <span class="btn-text">打印</span>
        </button>
        <button class="btn btn-secondary" id="btnExport" title="导出PNG">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          <span class="btn-text">导出</span>
        </button>
        <button class="btn btn-secondary" id="btnExample" title="加载示例">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <span class="btn-text">示例</span>
        </button>
      </div>
      <div class="status" id="status"><span class="status-dot"></span>就绪</div>
    </div>
    <div class="header-row">
      <div class="panel-toggle">
        <button class="toggle-btn active" id="toggleEditor" title="显示/隐藏编辑器">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          编辑器
        </button>
        <button class="toggle-btn" id="toggleSyntax" title="显示/隐藏语法提示">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          语法
        </button>
        <button class="toggle-btn active" id="togglePreview" title="显示/隐藏预览">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3v18h18V3zM5 17V5h14v12H5z"/><path d="M7 7h10v2H7zm0 4h10v2H7zm0 4h7v2H7z"/><rect x="6" y="6" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" rx="1"/></svg>
          预览
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="main">
    <!-- Editor Panel -->
    <div class="editor-panel">
      <div class="panel-header">
        <span><span class="panel-header-icon">✎</span>简谱源码</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn btn-secondary" id="btnCopy" title="复制源码到剪贴板" style="padding:4px 10px;font-size:12px;border-radius:12px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:3px;"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            复制
          </button>
          <span style="font-size:11px;font-weight:500;color:var(--text-muted);display:flex;align-items:center;gap:4px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            自动保存
          </span>
        </div>
      </div>
      <textarea class="editor" id="editor" placeholder="在此输入简谱...

试试输入示例：
1 2 3 4 | 5 6 5 3 | 2 - - - ||
^1 ^2 ^3 | ^5 ^6 ^5 | ^3 ^2 ^1 ||

点击右侧「示例」按钮加载完整demo"></textarea>
      <div class="syntax-help panel-hidden">
        <h4>标记语法速查</h4>
        <table>
          <tr><td><code>1-7</code></td><td>中音 do re mi fa sol la si</td></tr>
          <tr><td><code>^1-^7</code></td><td>高音（上方加点）</td></tr>
          <tr><td><code>_1-_7</code></td><td>低音（下方加点）</td></tr>
          <tr><td><code>-</code></td><td>增时线（延长前一音符时值）</td></tr>
          <tr><td><code>| - |</code></td><td>小节内独立休止符</td></tr>
          <tr><td><code>|</code></td><td>小节线</td></tr>
          <tr><td><code>||</code></td><td>终止线（双竖线）</td></tr>

          <tr><td><code>@120</code></td><td>速度设置（BPM）</td></tr>

    <!-- Preview Panel -->
    <div class="preview-panel">
      <div class="preview-header">

            <option value="0.75">75%</option>

  <script>
    // ============================================================
    // 简谱编辑器核心代码
    // ============================================================

    // ===== 全局状态 =====
    const state = {
      zoom: 1.0,
      isPlaying: false,
      audioCtx: null,
      currentSource: null,
      playbackStartTime: 0,
      playbackNotes: [],
      scheduledNotes: [],
      bpm: 120,
      key: 'C',
      timeSignature: [4, 4],
    };

    // ===== DOM 引用 =====
    const editor = document.getElementById('editor');
    const canvas = document.getElementById('jianpuCanvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const canvasContainer = document.getElementById('canvasContainer');

    // ===== 音高映射 =====
    // 简谱数字 1-7 对应音名（C大调）
    const NOTE_FREQUENCIES = {
      'C':  { '1': 261.63, '2': 293.66, '3': 329.63, '4': 349.23, '5': 392.00, '6': 440.00, '7': 493.88 },
      'C#': { '1': 277.18, '2': 311.13, '3': 349.23, '4': 369.99, '5': 415.30, '6': 466.16, '7': 523.25 },
      'D':  { '1': 293.66, '2': 329.63, '3': 369.99, '4': 392.00, '5': 440.00, '6': 493.88, '7': 554.37 },
      'D#': { '1': 311.13, '2': 349.23, '3': 392.00, '4': 415.30, '5': 466.16, '6': 523.25, '7': 587.33 },
      'E':  { '1': 329.63, '2': 369.99, '3': 415.30, '4': 440.00, '5': 493.88, '6': 554.37, '7': 622.25 },
      'F':  { '1': 349.23, '2': 392.00, '3': 440.00, '4': 466.16, '5': 523.25, '6': 587.33, '7': 659.25 },
      'F#': { '1': 369.99, '2': 415.30, '3': 466.16, '4': 493.88, '5': 554.37, '6': 622.25, '7': 698.46 },
      'G':  { '1': 392.00, '2': 440.00, '3': 493.88, '4': 523.25, '5': 587.33, '6': 659.25, '7': 739.99 },
      'G#': { '1': 415.30, '2': 466.16, '3': 523.25, '4': 554.37, '5': 622.25, '6': 698.46, '7': 783.99 },
      'A':  { '1': 440.00, '2': 493.88, '3': 554.37, '4': 587.33, '5': 659.25, '6': 739.99, '7': 830.61 },
      'A#': { '1': 466.16, '2': 523.25, '3': 587.33, '4': 622.25, '5': 698.46, '6': 783.99, '7': 880.00 },
      'B':  { '1': 493.88, '2': 554.37, '3': 622.25, '4': 659.25, '5': 739.99, '6': 830.61, '7': 932.33 },
    };

    // ===== 解析器 =====
    class JianPuParser {
      constructor() {
        this.tokens = [];
      }

      parse(text) {
        const lines = text.split('\n');
        const measures = [];
        let currentMeasure = [];
        let globalSettings = { bpm: 120, key: 'C', timeSignature: [4, 4], title: '' };

        for (let line of lines) {
          line = line.trim();
          if (!line || line.startsWith('#')) continue;

          // 全局设置
          if (line.startsWith('%')) {
            const match = line.match(/%([A-G]#?)=?(\d+)?\/?(\d+)?/);
            if (match) {
              globalSettings.key = match[1];
              if (match[2]) globalSettings.timeSignature[0] = parseInt(match[2]);
              if (match[3]) globalSettings.timeSignature[1] = parseInt(match[3]);
            }
            continue;
          }

          // BPM 设置
          if (line.startsWith('@')) {
            const bpm = parseInt(line.slice(1));
            if (!isNaN(bpm)) globalSettings.bpm = bpm;
            continue;
          }

          // 标题
          if (line.startsWith('!')) {
            globalSettings.title = line.slice(1).trim();
            continue;
          }

          // 解析音符和小节
          const tokens = this.tokenize(line);
          for (const token of tokens) {
            if (token.type === 'barline') {
              if (currentMeasure.length > 0) {
                measures.push({ notes: currentMeasure, isDouble: token.isDouble });
                currentMeasure = [];
              }
            } else if (token.type === 'note' || token.type === 'rest') {
              currentMeasure.push(token);
            }
          }
        }

        // 收尾小节
        if (currentMeasure.length > 0) {
          measures.push({ notes: currentMeasure, isDouble: true });
        }

        return { measures, settings: globalSettings };
      }

      tokenize(line) {
        const tokens = [];
        let i = 0;

        while (i < line.length) {
          const ch = line[i];

          // 小节线
          if (ch === '|') {
            if (line[i + 1] === '|') {
              tokens.push({ type: 'barline', isDouble: true });
              i += 2;
            } else {
              tokens.push({ type: 'barline', isDouble: false });
              i++;
            }
            continue;
          }

          // 空格跳过
          if (ch === ' ' || ch === '\t') {
            i++;
            continue;
          }

          // 音符
          if (/[0-7]/.test(ch)) {
            const note = this.parseNote(line, i);
            tokens.push(note.token);
            i = note.nextIndex;
            continue;
          }

          // 增时线（延长前一个音符时值）或休止符
          if (ch === '-') {
            let duration = 1;
            let hasDot = false;
            let underlines = 0;
            let i2 = i + 1;

            while (i2 < line.length && (line[i2] === '.' || line[i2] === '/' || line[i2] === '=')) {
              if (line[i2] === '.') hasDot = true;
              if (line[i2] === '/') underlines++;
              if (line[i2] === '=') underlines += 2;
              i2++;
            }

            // 计算时值
            duration = this.calculateDuration(underlines, hasDot);

            // 增时线始终作为独立的 rest token（占一个四分音符宽度，显示横线）
            tokens.push({
              type: 'rest',
              duration: duration,
              underlines: underlines,
              hasDot: hasDot
            });
            i = i2;
            continue;
          }

          i++;
        }

        return tokens;
      }

      parseNote(line, start) {
        let i = start;
        let octave = 0; // 0=中音, 1=高音, -1=低音
        let accidental = ''; // '', '#', 'b'
        let hasDot = false;
        let underlines = 0;
        let isTie = false;

        // 前缀：^ 高音, _ 低音
        while (i < line.length && (line[i] === '^' || line[i] === '_')) {
          if (line[i] === '^') octave++;
          if (line[i] === '_') octave--;
          i++;
        }

        // 数字
        const digit = line[i];
        i++;

        // 后缀
        while (i < line.length) {
          const ch = line[i];
          if (ch === '#') { accidental = '#'; i++; }
          else if (ch === 'b') { accidental = 'b'; i++; }
          else if (ch === '.') { hasDot = true; i++; }
          else if (ch === '/') { underlines++; i++; }
          else if (ch === '=') { underlines += 2; i++; }
          else if (ch === '~') { isTie = true; i++; }
          else break;
        }

        const duration = this.calculateDuration(underlines, hasDot);

        return {
          token: {
            type: 'note',
            digit: digit,
            octave: octave,
            accidental: accidental,
            duration: duration,
            underlines: underlines,
            hasDot: hasDot,
            isTie: isTie
          },
          nextIndex: i
        };
      }

      calculateDuration(underlines, hasDot) {
        let duration = 1;
        if (underlines >= 2) duration = 0.25;
        else if (underlines === 1) duration = 0.5;
        if (hasDot) duration *= 1.5;
        return duration;
      }
    }

    // ===== 渲染器 =====
    class JianPuRenderer {
      constructor(canvas, ctx) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.config = {
          noteSize: 28,
          lineHeight: 80,
          measureGap: 40,
          noteGap: 36,
          marginX: 60,
          marginY: 80,
          titleSize: 28,
          subtitleSize: 14,
          dotRadius: 3,
          underlineHeight: 3,
          barlineWidth: 2,
        };
      }

      render(data) {
        const { measures, settings } = data;
        if (measures.length === 0) {
          this.renderEmpty();
          return;
        }

        // A4 纸尺寸: 210mm x 297mm
        // 打印分辨率 96 DPI: 794 x 1123 pixels
        // 留边距后可用宽度约 720px
        const A4_WIDTH = 720;
        const A4_HEIGHT = 1050;
        const MARGIN_X = 40;
        const MARGIN_Y = 50;

        // 根据音符数量计算每行最多几个音符
        const maxNotesPerLine = Math.floor((A4_WIDTH - MARGIN_X * 2) / 45);
        const lines = this.layoutMeasures(measures, maxNotesPerLine);

        // 计算总高度
        const lineHeight = 50;
        const titleHeight = settings.title ? 40 : 0;
        const totalHeight = MARGIN_Y * 2 + titleHeight + lines.length * lineHeight + 20;

        // 设置 canvas 尺寸 - 使用 A4 比例
        const scale = 1.5; // 高清渲染
        canvas.width = A4_WIDTH * scale;
        canvas.height = Math.max(totalHeight, 400) * scale;
        canvas.style.width = '100%';
        canvas.style.maxWidth = A4_WIDTH + 'px';
        canvas.style.height = 'auto';
        ctx.scale(scale, scale);

        // 背景
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, A4_WIDTH, Math.max(totalHeight, 400));

        // 标题
        let y = MARGIN_Y;
        if (settings.title) {
          ctx.fillStyle = '#1a1a2e';
          ctx.font = `bold 22px "Segoe UI", "PingFang SC", sans-serif`;
          ctx.textAlign = 'center';
          ctx.fillText(settings.title, A4_WIDTH / 2, y);
          y += 35;
        }

        // 调号拍号
        ctx.fillStyle = '#555';
        ctx.font = `12px "Segoe UI", "PingFang SC", sans-serif`;
        ctx.textAlign = 'left';
        const keyText = `${settings.key}大调  ${settings.timeSignature[0]}/${settings.timeSignature[1]}拍  ♩=${settings.bpm}`;
        ctx.fillText(keyText, MARGIN_X, y);
        y += 25;

        // 渲染每行
        for (const line of lines) {
          this.renderLine(ctx, line, MARGIN_X, y, A4_WIDTH - MARGIN_X * 2);
          y += lineHeight;
        }

        // 存储设置供播放使用
        state.bpm = settings.bpm;
        state.key = settings.key;
        state.timeSignature = settings.timeSignature;

        // 收集可播放的音符
        this.collectPlaybackNotes(measures, settings);
      }

      layoutMeasures(measures, maxPerLine) {
        const lines = [];
        let currentLine = [];
        let currentCount = 0;

        for (const measure of measures) {
          const noteCount = measure.notes.filter(n => n.type === 'note').length;
          if (currentCount + noteCount > maxPerLine && currentLine.length > 0) {
            lines.push(currentLine);
            currentLine = [measure];
            currentCount = noteCount;
          } else {
            currentLine.push(measure);
            currentCount += noteCount;
          }
        }

        if (currentLine.length > 0) {
          lines.push(currentLine);
        }

        return lines;
      }

      renderLine(ctx, lineMeasures, x, y, availableWidth) {
        // 计算总时值权重：四分音符=1, 八分=0.7, 十六分=0.5
        let totalWeight = 0;
        for (const measure of lineMeasures) {
          for (const note of measure.notes) {
            totalWeight += this.getNoteWeight(note);
          }
        }

        // 计算基础宽度，但限制最大宽度避免单小节过度拉伸
        const rawBaseWidth = availableWidth / Math.max(totalWeight, 1);
        const MAX_NOTE_WIDTH = 50; // 四分音符最大宽度限制
        const baseWidth = Math.min(rawBaseWidth, MAX_NOTE_WIDTH);
        let currentX = x;

        for (let m = 0; m < lineMeasures.length; m++) {
          const measure = lineMeasures[m];
          const isLast = m === lineMeasures.length - 1;

          // 识别需要连线的音符组
          const noteGroups = this.groupShortNotes(measure.notes);

          // 预计算每个音符的位置
          const notePositions = [];
          let tempX = currentX;
          for (let i = 0; i < measure.notes.length; i++) {
            const note = measure.notes[i];
            const noteWidth = baseWidth * this.getNoteWeight(note);
            notePositions.push({
              x: tempX + noteWidth / 2,
              width: noteWidth,
              left: tempX,
              right: tempX + noteWidth
            });
            tempX += noteWidth;
          }

          // 渲染小节内音符
          for (let i = 0; i < measure.notes.length; i++) {
            const note = measure.notes[i];
            const pos = notePositions[i];

            if (note.type === 'note') {
              // 找到这个音符属于哪个组
              const group = noteGroups.find(g => g.indices.includes(i));
              this.renderNote(ctx, note, pos.x, y, group, notePositions, i);
            } else if (note.type === 'rest') {
              this.renderRest(ctx, note, pos.x, y);
            }
          }

          // 画组间连线下划线
          for (const group of noteGroups) {
            if (group.indices.length >= 2) {
              this.renderGroupBeams(ctx, measure.notes, notePositions, group, y);
            }
          }

          // 更新 currentX 到小节末尾
          currentX = tempX;

          // 小节线
          ctx.strokeStyle = '#1a1a2e';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(currentX, y - 25);
          ctx.lineTo(currentX, y + 15);
          ctx.stroke();

          // 终止双竖线
          if (measure.isDouble && isLast) {
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(currentX + 3, y - 25);
            ctx.lineTo(currentX + 3, y + 15);
            ctx.stroke();

            // 粗线
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(currentX + 8, y - 25);
            ctx.lineTo(currentX + 8, y + 15);
            ctx.stroke();
          }
        }
      }

      getNoteWeight(note) {
        if (note.type === 'rest') return note.duration;
        // duration >= 1 是四分或更长
        if (note.duration >= 1) return 1;
        if (note.duration >= 0.5) return 0.7; // 八分音符组占 0.7 宽度
        if (note.duration >= 0.25) return 0.5; // 十六分音符组占 0.5 宽度
        return 0.4; // 三十二分
      }

      groupShortNotes(notes) {
        // 将相邻的短音符分组，用于连线下划线
        // 核心规则：同一组内所有音符共享最下面的连线
        // 有 underlines=1 的音符参与时，组最多2个音符（2个八分=1拍）
        // 只有 underlines>=2 的音符时，组最多4个音符（4个十六分=1拍）
        const groups = [];
        let currentGroup = null;

        for (let i = 0; i < notes.length; i++) {
          const note = notes[i];
          if (note.type === 'note' && note.underlines > 0) {
            if (!currentGroup || !this.canJoinGroup(currentGroup, note, notes)) {
              // 开始新组
              if (currentGroup) groups.push(currentGroup);
              currentGroup = {
                indices: [i],
                notes: [note],
                maxUnderlines: note.underlines
              };
            } else {
              // 继续当前组
              currentGroup.indices.push(i);
              currentGroup.notes.push(note);
              currentGroup.maxUnderlines = Math.max(currentGroup.maxUnderlines, note.underlines);
            }
          } else {
            // 遇到非短音符，结束当前组
            if (currentGroup) {
              groups.push(currentGroup);
              currentGroup = null;
            }
          }
        }
        if (currentGroup) groups.push(currentGroup);

        return groups;
      }

      canJoinGroup(group, note, allNotes) {
        // 检查组内总时值是否已满
        const currentUnits = this.calculateGroupUnits(group);
        const noteUnits = this.getNoteUnits(note);

        // 如果组内有八分音符(underlines=1)，最多2个单位（1拍）
        // 如果全是十六分/三十二分，最多4个单位（1拍）
        const hasEighth = group.notes.some(n => n.underlines === 1);
        const maxUnits = hasEighth ? 2 : 4;

        return currentUnits + noteUnits <= maxUnits;
      }

      calculateGroupUnits(group) {
        // 计算组内已有的时值单位总数（以十六分音符为1单位）
        let units = 0;
        for (const note of group.notes) {
          units += this.getNoteUnits(note);
        }
        return units;
      }

      getNoteUnits(note) {
        // 返回音符的时值单位（以十六分音符为1单位）
        if (note.underlines >= 3) return 0.5; // 三十二分 = 0.5单位
        if (note.underlines === 2) return 1; // 十六分 = 1单位
        if (note.underlines === 1) return 2; // 八分 = 2单位
        return 4; // 四分 = 4单位
      }

      renderNote(ctx, note, x, y, group, notePositions, noteIdx) {
        const size = 20; // 缩小字号适配 A4
        const dotRadius = 2.5;

        ctx.fillStyle = '#1a1a2e';
        ctx.font = `bold ${size}px "Segoe UI", "PingFang SC", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 计算Y偏移（高低音）
        let yOffset = 0;
        if (note.octave > 0) yOffset = -10 * note.octave;
        if (note.octave < 0) yOffset = 10 * Math.abs(note.octave);

        const noteY = y + yOffset;

        // 升降号
        let xOffset = 0;
        if (note.accidental) {
          ctx.font = `${size * 0.7}px "Segoe UI", sans-serif`;
          ctx.fillText(note.accidental === '#' ? '♯' : '♭', x - size * 0.5, noteY);
          xOffset = size * 0.2;
        }

        // 数字
        ctx.font = `bold ${size}px "Segoe UI", "PingFang SC", sans-serif`;
        ctx.fillText(note.digit, x + xOffset, noteY);

        // 高音点（上方）
        if (note.octave > 0) {
          for (let i = 0; i < note.octave; i++) {
            ctx.beginPath();
            ctx.arc(x + xOffset, noteY - size * 0.5 - i * 8, dotRadius, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // 低音点（下方）
        if (note.octave < 0) {
          for (let i = 0; i < Math.abs(note.octave); i++) {
            ctx.beginPath();
            ctx.arc(x + xOffset, noteY + size * 0.5 + i * 8, dotRadius, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        // 附点
        if (note.hasDot) {
          ctx.beginPath();
          ctx.arc(x + size * 0.5 + xOffset, noteY + 1, dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }

        // 单音符的下划线（不在组内的，或组内只有一个音符的）
        if (note.underlines > 0 && (!group || group.indices.length === 1)) {
          ctx.strokeStyle = '#1a1a2e';
          ctx.lineWidth = 2;
          const lineY = noteY + size * 0.4 + 2;
          const lineWidth = size * 0.6;

          for (let i = 0; i < note.underlines; i++) {
            ctx.beginPath();
            ctx.moveTo(x - lineWidth / 2 + xOffset, lineY + i * 5);
            ctx.lineTo(x + lineWidth / 2 + xOffset, lineY + i * 5);
            ctx.stroke();
          }
        }
      }

      renderGroupBeams(ctx, notes, notePositions, group, y) {
        const size = 20;
        const underlineHeight = 2;
        const lineSpacing = 5;

        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = underlineHeight;

        // 获取组内第一个和最后一个音符的位置
        const firstIdx = group.indices[0];
        const lastIdx = group.indices[group.indices.length - 1];
        const firstPos = notePositions[firstIdx];
        const lastPos = notePositions[lastIdx];
        const firstNote = notes[firstIdx];

        // 计算Y位置（基于第一个音符）
        let yOffset = 0;
        if (firstNote.octave > 0) yOffset = -10 * firstNote.octave;
        if (firstNote.octave < 0) yOffset = 10 * Math.abs(firstNote.octave);
        const noteY = y + yOffset;
        const baseLineY = noteY + size * 0.4 + 2;

        // 画最下面的主连线（所有音符都连）
        ctx.beginPath();
        ctx.moveTo(firstPos.x, baseLineY);
        ctx.lineTo(lastPos.x, baseLineY);
        ctx.stroke();

        // 画额外的下划线（根据每个音符的 underlines 数量）
        // 遍历组内每个音符，在其中心位置画它自己的额外下划线
        for (let i = 0; i < group.indices.length; i++) {
          const idx = group.indices[i];
          const note = notes[idx];
          const pos = notePositions[idx];

          // 这个音符需要画的额外下划线数（不包括最下面已经画的主线）
          const extraLines = note.underlines - 1;

          for (let line = 0; line < extraLines; line++) {
            const lineY = baseLineY + (line + 1) * lineSpacing;
            const lineWidth = size * 0.5;

            ctx.beginPath();
            ctx.moveTo(pos.x - lineWidth / 2, lineY);
            ctx.lineTo(pos.x + lineWidth / 2, lineY);
            ctx.stroke();
          }
        }
      }

      renderRest(ctx, note, x, y) {
        const size = 20;

        ctx.fillStyle = '#1a1a2e';
        ctx.font = `${size}px "Segoe UI", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 休止符用特殊符号或横线表示
        if (note.duration >= 1) {
          // 全休止符/二分休止符 - 用横线表示
          ctx.strokeStyle = '#1a1a2e';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x - 8, y);
          ctx.lineTo(x + 8, y);
          ctx.stroke();
        } else {
          // 短休止符 - 用点或特殊标记
          ctx.beginPath();
          ctx.arc(x, y, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }

        // 下划线
        if (note.underlines > 0) {
          ctx.strokeStyle = '#1a1a2e';
          ctx.lineWidth = 2;
          const lineY = y + size * 0.4 + 2;
          const lineWidth = size * 0.6;

          for (let i = 0; i < note.underlines; i++) {
            ctx.beginPath();
            ctx.moveTo(x - lineWidth / 2, lineY + i * 5);
            ctx.lineTo(x + lineWidth / 2, lineY + i * 5);
            ctx.stroke();
          }
        }
      }

      renderEmpty() {
        const A4_WIDTH = 720;
        const scale = 1.5;

        canvas.width = A4_WIDTH * scale;
        canvas.height = 400 * scale;
        canvas.style.width = '100%';
        canvas.style.maxWidth = A4_WIDTH + 'px';
        canvas.style.height = 'auto';
        ctx.scale(scale, scale);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, A4_WIDTH, 400);

        ctx.fillStyle = '#ccc';
        ctx.font = '18px "Segoe UI", "PingFang SC", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🎵 在左侧编辑器输入简谱，此处将实时预览', A4_WIDTH / 2, 200 - 20);
        ctx.font = '14px "Segoe UI", sans-serif';
        ctx.fillText('例如: 1 2 3 4 | 5 6 5 3 | 2 - - - ||', A4_WIDTH / 2, 200 + 20);
      }

      collectPlaybackNotes(measures, settings) {
        const notes = [];
        let time = 0;
        // 四分音符时长 = 60秒 / BPM
        // 例如 BPM=100, 四分音符 = 0.6秒
        const quarterDuration = 60 / settings.bpm;

        for (const measure of measures) {
          for (const note of measure.notes) {
            // note.duration: 1=四分音符, 0.5=八分音符, 0.25=十六分音符, 1.5=附点四分音符
            const duration = note.duration * quarterDuration;

            if (note.type === 'note') {
              const freq = this.getFrequency(note, settings.key);
              notes.push({
                frequency: freq,
                startTime: time,
                duration: duration,
                digit: note.digit,
                octave: note.octave
              });
            }
            time += duration;
          }
        }

        state.playbackNotes = notes;
        state.totalDuration = time;
      }

      getFrequency(note, key) {
        const baseFreqs = NOTE_FREQUENCIES[key] || NOTE_FREQUENCIES['C'];
        let freq = baseFreqs[note.digit] || 440;

        // 八度调整
        if (note.octave > 0) {
          freq *= Math.pow(2, note.octave);
        } else if (note.octave < 0) {
          freq /= Math.pow(2, Math.abs(note.octave));
        }

        // 升降号
        if (note.accidental === '#') {
          freq *= Math.pow(2, 1/12);
        } else if (note.accidental === 'b') {
          freq /= Math.pow(2, 1/12);
        }

        return freq;
      }
    }

    // ===== 音频播放器 =====
    class JianPuPlayer {
      constructor() {
        this.audioCtx = null;
        this.isPlaying = false;
        this.currentSources = [];
      }

      initAudio() {
        if (!this.audioCtx) {
          this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.audioCtx.state === 'suspended') {
          this.audioCtx.resume();
        }
      }

      play(notes, totalDuration) {
        this.initAudio();
        this.stop(true);

        const now = this.audioCtx.currentTime;
        this.isPlaying = true;
        state.playbackStartTime = now;
        state.isPlaying = true;

        // 播放进度条
        document.getElementById('playbackBar').style.display = 'block';

        for (const note of notes) {
          if (note.frequency <= 0) continue;

          const osc = this.audioCtx.createOscillator();
          const gain = this.audioCtx.createGain();

          osc.connect(gain);
          gain.connect(this.audioCtx.destination);

          osc.type = 'sine';
          osc.frequency.value = note.frequency;

          const startTime = now + note.startTime;
          const endTime = startTime + note.duration;

          // ADSR 包络 + 自然结束淡出
          gain.gain.setValueAtTime(0, startTime);
          gain.gain.linearRampToValueAtTime(0.3, startTime + 0.02); // Attack
          gain.gain.setValueAtTime(0.3, endTime - 0.05); // Sustain
          gain.gain.exponentialRampToValueAtTime(0.001, endTime); // Release

          osc.start(startTime);
          // 让增益节点控制结束，振荡器多留一点尾巴
          osc.stop(endTime + 0.02);

          this.currentSources.push({ osc, gain });
        }

        // 进度更新
        this.updateProgress(totalDuration);

        // 播放结束自动停止
        setTimeout(() => {
          this.stop();
          // 恢复播放按钮 UI
          const btnPlay = document.getElementById('btnPlay');
          if (btnPlay) {
            btnPlay.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 播放';
            btnPlay.classList.remove('btn-active');
          }
        }, totalDuration * 1000 + 200);
      }

      updateProgress(totalDuration) {
        const progressBar = document.getElementById('playbackProgress');
        const update = () => {
          if (!this.isPlaying) return;
          const elapsed = this.audioCtx.currentTime - state.playbackStartTime;
          const progress = Math.min((elapsed / totalDuration) * 100, 100);
          progressBar.style.width = progress + '%';

          if (progress < 100) {
            requestAnimationFrame(update);
          }
        };
        requestAnimationFrame(update);
      }

      stop(immediate = false) {
        this.isPlaying = false;
        state.isPlaying = false;

        if (immediate) {
          // 立即强制停止（play() 开头调用，清理旧资源）
          for (const source of this.currentSources) {
            try {
              source.osc.stop();
              source.osc.disconnect();
              source.gain.disconnect();
            } catch (e) {}
          }
          this.currentSources = [];
        } else {
          // 用户手动停止：平滑淡出
          const now = this.audioCtx ? this.audioCtx.currentTime : 0;

          for (const source of this.currentSources) {
            try {
              const gain = source.gain;
              gain.gain.cancelScheduledValues(now);
              gain.gain.setValueAtTime(gain.gain.value || 0.001, now);
              gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
              source.osc.stop(now + 0.06);
            } catch (e) {}
          }

          // 延迟清理
          setTimeout(() => {
            for (const source of this.currentSources) {
              try {
                source.osc.disconnect();
                source.gain.disconnect();
              } catch (e) {}
            }
            this.currentSources = [];
          }, 100);
        }

        document.getElementById('playbackBar').style.display = 'none';
        document.getElementById('playbackProgress').style.width = '0%';
        status.textContent = '就绪';
      }
    }

    // ===== 初始化 =====
    const parser = new JianPuParser();
    const renderer = new JianPuRenderer(canvas, ctx);
    const player = new JianPuPlayer();

    // 渲染函数
    function render() {
      const text = editor.value;
      const data = parser.parse(text);
      renderer.render(data);
    }

    // 事件监听
    editor.addEventListener('input', () => {
      render();
      // 保存到 localStorage
      localStorage.setItem('jianpu_editor_content', editor.value);
    });

    // 播放按钮
    document.getElementById('btnPlay').addEventListener('click', () => {
      if (state.isPlaying) {
        player.stop();
        document.getElementById('btnPlay').innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 播放';
        document.getElementById('btnPlay').classList.remove('btn-active');
        return;
      }

      if (state.playbackNotes.length === 0) {
        status.textContent = '没有可播放的音符';
        return;
      }

      player.play(state.playbackNotes, state.totalDuration);
      document.getElementById('btnPlay').innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg> 暂停';
      document.getElementById('btnPlay').classList.add('btn-active');
      status.textContent = `播放中... ♩=${state.bpm}`;
    });

    // 停止按钮
    document.getElementById('btnStop').addEventListener('click', () => {
      player.stop();
      document.getElementById('btnPlay').innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> 播放';
      document.getElementById('btnPlay').classList.remove('btn-active');
    });

    // 打印按钮
    document.getElementById('btnPrint').addEventListener('click', () => {
      window.print();
    });

    // 导出PNG
    document.getElementById('btnExport').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'jianpu_' + new Date().toISOString().slice(0, 10) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      status.textContent = '已导出PNG';
      setTimeout(() => status.textContent = '就绪', 2000);
    });

    // 示例按钮
    document.getElementById('btnExample').addEventListener('click', () => {
      const example = `!小星星
%C=4/4
@100

1 1 5 5 | 6 6 5 - | 4 4 3 3 | 2 2 1 - |
5 5 4 4 | 3 3 2 - | 5 5 4 4 | 3 3 2 - |
1 1 5 5 | 6 6 5 - | 4 4 3 3 | 2 2 1 - ||`;
      editor.value = example;
      render();
      status.innerHTML = '<span class="status-dot"></span>已加载：小星星';
    });

    // 复制源码按钮
    document.getElementById('btnCopy').addEventListener('click', async () => {
      const btn = document.getElementById('btnCopy');
      const originalHTML = btn.innerHTML;

      try {
        await navigator.clipboard.writeText(editor.value);
      } catch (err) {
        // 降级方案
        const textarea = document.createElement('textarea');
        textarea.value = editor.value;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
      }

      // 按钮变为成功状态
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> 已复制';
      btn.style.background = 'var(--success)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--success)';

      // 底部状态栏提示
      status.innerHTML = '<span class="status-dot" style="background:var(--success);"></span>已复制到剪贴板';

      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.style.background = '';
        btn.style.color = '';
        btn.style.borderColor = '';
        status.innerHTML = '<span class="status-dot"></span>就绪';
      }, 2000);
    });

    // 缩放控制
    document.getElementById('zoomIn').addEventListener('click', () => {
      const zoomSelect = document.getElementById('zoomSelect');
      const options = Array.from(zoomSelect.options).filter(o => o.value !== 'fit').map(o => parseFloat(o.value));
      const currentIdx = options.findIndex(v => v >= state.zoom);
      const nextZoom = currentIdx < options.length - 1 ? options[currentIdx + 1] : options[options.length - 1];
      state.zoom = nextZoom;
      updateZoom();
      zoomSelect.value = String(nextZoom);
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      const zoomSelect = document.getElementById('zoomSelect');
      const options = Array.from(zoomSelect.options).map(o => parseFloat(o.value));
      const currentIdx = options.findIndex(v => v >= state.zoom);
      const prevIdx = currentIdx > 0 ? currentIdx - 1 : 0;
      const prevZoom = options[prevIdx];
      state.zoom = prevZoom;
      updateZoom();
      zoomSelect.value = String(prevZoom);
    });

    document.getElementById('zoomSelect').addEventListener('change', (e) => {
      state.zoom = parseFloat(e.target.value);
      updateZoom();
    });

    function updateZoom() {
      canvas.style.transform = `scale(${state.zoom})`;
      canvas.style.transformOrigin = 'top center';
    }

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.target === editor) return; // 编辑时不触发

      if (e.code === 'Space') {
        e.preventDefault();
        document.getElementById('btnPlay').click();
      }
      if (e.code === 'Escape') {
        document.getElementById('btnStop').click();
      }
      if (e.ctrlKey && e.key === 'p') {
        e.preventDefault();
        window.print();
      }
    });

    // 面板状态 - 与HTML初始状态保持一致
    const panelStates = {
      editor: true,
      syntax: false,
      preview: true
    };

    function updatePanelVisibility() {
      const editorPanel = document.querySelector('.editor-panel');
      const syntaxHelp = document.querySelector('.syntax-help');
      const previewPanel = document.querySelector('.preview-panel');
      const main = document.querySelector('.main');

      // 编辑器
      if (panelStates.editor) {
        editorPanel.classList.remove('panel-hidden');
        document.getElementById('toggleEditor').classList.add('active');
      } else {
        editorPanel.classList.add('panel-hidden');
        document.getElementById('toggleEditor').classList.remove('active');
      }

      // 语法提示
      if (panelStates.syntax) {
        syntaxHelp.classList.remove('panel-hidden');
        document.getElementById('toggleSyntax').classList.add('active');
      } else {
        syntaxHelp.classList.add('panel-hidden');
        document.getElementById('toggleSyntax').classList.remove('active');
      }

      // 预览区
      if (panelStates.preview) {
        previewPanel.classList.remove('panel-hidden');
        document.getElementById('togglePreview').classList.add('active');
      } else {
        previewPanel.classList.add('panel-hidden');
        document.getElementById('togglePreview').classList.remove('active');
      }

      // 如果只有一个面板显示，让它占满空间
      const visiblePanels = [panelStates.editor, panelStates.preview].filter(Boolean).length;
      if (visiblePanels === 1) {
        main.style.flexDirection = 'column';
        if (panelStates.editor && !panelStates.preview) {
          editorPanel.style.height = 'calc(100vh - 56px)';
          editorPanel.style.flex = '1';
        }
        if (panelStates.preview && !panelStates.editor) {
          previewPanel.style.height = 'calc(100vh - 56px)';
          previewPanel.style.flex = '1';
        }
      } else {
        editorPanel.style.height = '';
        editorPanel.style.flex = '';
        previewPanel.style.height = '';
        previewPanel.style.flex = '';
      }

      // 重新渲染
      setTimeout(() => render(), 100);
    }

    document.getElementById('toggleEditor').addEventListener('click', () => {
      panelStates.editor = !panelStates.editor;
      updatePanelVisibility();
    });

    document.getElementById('toggleSyntax').addEventListener('click', () => {
      panelStates.syntax = !panelStates.syntax;
      updatePanelVisibility();
    });

    document.getElementById('togglePreview').addEventListener('click', () => {
      panelStates.preview = !panelStates.preview;
      updatePanelVisibility();
    });

    // 恢复上次内容
    const saved = localStorage.getItem('jianpu_editor_content');
    if (saved) {
      editor.value = saved;
    }

    // 初始渲染
    render();

    // 窗口大小变化
    window.addEventListener('resize', () => {
      render();
    });
  </script>
</body>
</html>
